<div class="slide slide-content" style="
  background-color: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  padding: 48px 64px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  box-sizing: border-box;
  gap: 32px;
">
  <h2 style="
    font-family: ui-serif, Georgia, serif;
    font-size: clamp(1.76rem, 4.4vw, 2.64rem);
    font-weight: 700;
    color: var(--text-primary);
    margin: 0;
    line-height: 1.2;
    flex-shrink: 0;
  "><!-- TITLE --></h2>
  <div style="
    flex: 1;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: clamp(0.96rem, 2.4vw, 1.44rem);
    line-height: 1.7;
    color: var(--text-primary);
  ">
    <!-- CONTENT -->
    <ul style="
      margin: 0;
      padding: 0 0 0 1.4em;
      display: flex;
      flex-direction: column;
      gap: 14px;
    ">
      <li style="color: var(--text-primary);"><!-- BULLET_1 --></li>
      <li style="color: var(--text-primary);"><!-- BULLET_2 --></li>
      <li style="color: var(--text-primary);"><!-- BULLET_3 --></li>
    </ul>
  </div>
  <div style="
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.9rem);
    color: var(--text-secondary);
  ">
    <span><!-- FOOTER_LEFT --></span>
    <span><!-- PAGE_NUMBER --></span>
  </div>
</div>
