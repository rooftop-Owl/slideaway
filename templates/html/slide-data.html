<div class="slide slide-data" style="
  background-color: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  padding: 48px 64px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  box-sizing: border-box;
  gap: 24px;
">
  <div style="
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  ">
    <h2 style="
      font-family: ui-serif, Georgia, serif;
      font-size: clamp(1.76rem, 4.4vw, 2.64rem);
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      line-height: 1.2;
    "><!-- TITLE --></h2>
    <p style="
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.64rem, 1.6vw, 0.96rem);
      color: var(--text-secondary);
      margin: 0;
      letter-spacing: 0.02em;
    "><!-- DATA_SOURCE --></p>
  </div>
  <div style="
    flex: 1;
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  ">
    <!-- CHART -->
    <span style="
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.64rem, 1.6vw, 0.96rem);
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    ">Chart / Data visualization</span>
  </div>
  <p style="
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: clamp(0.68rem, 1.7vw, 1.02rem);
    color: var(--text-secondary);
    margin: 0;
    flex-shrink: 0;
    font-style: italic;
  "><!-- CAPTION --></p>
</div>
