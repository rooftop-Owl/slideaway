<div class="slide slide-section" style="
  background-color: var(--bg-dark);
  color: var(--text-light);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 64px 80px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
">
  <div style="
    position: absolute;
    top: 40px;
    right: 64px;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: clamp(6.4rem, 16.0vw, 9.6rem);
    font-weight: 800;
    color: var(--text-secondary);
    opacity: 0.12;
    line-height: 1;
    letter-spacing: -0.04em;
    pointer-events: none;
  "><!-- SECTION_NUMBER --></div>
  <div>
    <p style="
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.64rem, 1.6vw, 0.96rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 0 0 20px 0;
    "><!-- SECTION_LABEL --></p>
    <h2 style="
      font-family: ui-serif, Georgia, serif;
      font-size: clamp(2.4rem, 6.0vw, 3.6rem);
      font-weight: 700;
      color: var(--text-light);
      margin: 0;
      line-height: 1.15;
      letter-spacing: -0.02em;
    "><!-- SECTION_TITLE --></h2>
  </div>
</div>
