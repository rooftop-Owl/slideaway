<div class="slide slide-two-column" style="
  background-color: var(--bg-primary);

  display: flex;

  overflow: hidden;
  box-sizing: border-box;
  gap: 28px;
">
  <h2 style="

    line-height: 1.2;
    flex-shrink: 0;
  "><!-- TITLE --></h2>
  <div style="
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  ">
    <div style="
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.88rem, 2.2vw, 1.32rem);
      line-height: 1.65;
      color: var(--text-primary);
      border-right: 1px solid var(--border);
      padding-right: 40px;
    ">
      <h3 style="
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(0.64rem, 1.6vw, 0.96rem);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        margin: 0 0 16px 0;
      "><!-- COL_LEFT_HEADING --></h3>
      <!-- COL_LEFT_CONTENT -->
    </div>
    <div style="
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(0.88rem, 2.2vw, 1.32rem);
      line-height: 1.65;
      color: var(--text-primary);
      padding-left: 40px;
    ">
      <h3 style="
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(0.64rem, 1.6vw, 0.96rem);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        margin: 0 0 16px 0;
      "><!-- COL_RIGHT_HEADING --></h3>
      <!-- COL_RIGHT_CONTENT -->
    </div>
  </div>
  <div style="
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.9rem);
    color: var(--text-secondary);
  ">
    <span><!-- FOOTER_LEFT --></span>
    <span><!-- PAGE_NUMBER --></span>
